name: Docker backend

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docker-health:
    name: Backend image + /v1/health
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: docker build -f Dockerfile -t inkbrief-backend:ci .
      - name: Run and probe
        run: |
          set -e
          docker run -d --name ib-ci -p 8765:8765 inkbrief-backend:ci
          for i in $(seq 1 40); do
            if curl -fsS http://127.0.0.1:8765/v1/health >/dev/null 2>&1 \
              || curl -fsS http://127.0.0.1:8765/docs >/dev/null 2>&1 \
              || curl -fsS http://127.0.0.1:8765/openapi.json >/dev/null 2>&1; then
              echo probe OK
              docker rm -f ib-ci
              exit 0
            fi
            sleep 2
          done
          docker logs ib-ci || true
          docker rm -f ib-ci || true
          exit 1
